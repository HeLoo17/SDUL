services:
  backend:
    build:
      context: ./backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
    expose:
      - "5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; req=urllib.request.Request('http://127.0.0.1:5000/api/status', headers={'X-API-Key': os.environ.get('DASHBOARD_API_KEY', '')}); urllib.request.urlopen(req, timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_API_KEY: ${DASHBOARD_API_KEY:-}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
